<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trình Chiếu Thông Tin</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#000814;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* Chia màn hình */
.container{
    width:100vw;
    height:100vh;
    display:flex;
}

/* Bên trái 1/3 */
.left{
    width:33.33%;
    background:#001d3d;
    display:flex;
    justify-content:center;
    align-items:center;
}

.left img{
    max-width:85%;
    max-height:85%;
    border:6px solid white;
    box-shadow:0 0 25px #00b4d8;
}

/* Bên phải 2/3 */
.right{
    width:66.66%;
    position:relative;
    overflow:hidden;
    padding-left:60px;
}

/* Vùng chữ chạy */
.scroll{
    position:absolute;
    width:85%;
    animation:scrollUp 25s linear infinite;
}

@keyframes scrollUp{
    0%{ transform:translateY(100%); }
    100%{ transform:translateY(-100%); }
}

.info{
    font-size:48px;
    line-height:90px;
    font-weight:bold;
    color:#ffd60a;
    text-shadow:0 0 15px #ffc300;
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <img src="anh.jpg" alt="Ảnh">
    </div>

    <div class="right">
        <div class="scroll">
            <div class="info" id="data">
                ĐANG TẢI DỮ LIỆU...
            </div>
        </div>
    </div>

</div>

<script>
fetch("thongtin.txt")
.then(response => response.text())
.then(data => {
    document.getElementById("data").innerHTML =
        data.replace(/\n/g,"<br>");
})
.catch(error => {
    document.getElementById("data").innerHTML =
        "KHÔNG TÌM THẤY FILE thongtin.txt";
});
</script>

</body>
</html>
